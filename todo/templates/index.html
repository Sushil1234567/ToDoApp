<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }
        .container {
            width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            margin-top: 50px;
            border-radius: 10px;
        }
        input {
            padding: 10px;
            width: 70%;
        }
        button {
            padding: 10px;
            background: green;
            color: white;
            border: none;
        }
        li {
            list-style: none;
            margin: 10px;
        }
        a {
            color: red;
            margin-left: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>To-Do List</h2>

    <form method="POST" action="/add/">
        {% csrf_token %}
        <input type="text" name="title" placeholder="Enter task" required>
        <button type="submit">Add</button>
    </form>

    <ul>
        {% for task in tasks %}
            <li>
                {{ task.1 }}
                <a href="/delete/{{ task.0 }}">❌</a>
            </li>
        {% endfor %}
    </ul>
</div>

</body>
</html>
